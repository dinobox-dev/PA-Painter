name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  ITCH_GAME: dinoboxgamedev/papainter

jobs:
  verify:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version consistency
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          CARGO=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO}"
            exit 1
          fi
          echo "Version match confirmed: v${CARGO}"

  build-mac:
    name: Build macOS ${{ matrix.name }}
    needs: verify
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - name: arm64
            target: aarch64-apple-darwin
          - name: x64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR="pa-painter-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/pa-painter" "$DIR/"
          cp "target/${{ matrix.target }}/release/pa-painter-gui" "$DIR/"
          cp README.md LICENSE CHANGELOG.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # Create a universal macOS binary, then codesign and notarize
  macos-universal:
    name: macOS Universal + Notarize
    needs: build-mac
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: aarch64-apple-darwin
          path: arm64

      - uses: actions/download-artifact@v5
        with:
          name: x86_64-apple-darwin
          path: x64

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Resolve the signing identity for later steps
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Create universal binary
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR="pa-painter-${TAG}-universal-apple-darwin"
          mkdir -p "$DIR" tmp-arm64 tmp-x64

          tar xzf arm64/*.tar.gz -C tmp-arm64 --strip-components=1
          tar xzf x64/*.tar.gz -C tmp-x64 --strip-components=1

          lipo -create -output "$DIR/pa-painter" \
            tmp-arm64/pa-painter tmp-x64/pa-painter
          lipo -create -output "$DIR/pa-painter-gui" \
            tmp-arm64/pa-painter-gui tmp-x64/pa-painter-gui

          cp README.md LICENSE CHANGELOG.md "$DIR/"
          echo "UNIVERSAL_DIR=$DIR" >> "$GITHUB_ENV"

      - name: Create .app bundle
        run: |
          APP="PA Painter.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp "$UNIVERSAL_DIR/pa-painter-gui" "$APP/Contents/MacOS/"
          cp assets/icon.icns "$APP/Contents/Resources/AppIcon.icns"

          VERSION=${GITHUB_REF#refs/tags/v}
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>PA Painter</string>
            <key>CFBundleDisplayName</key>
            <string>PA Painter</string>
            <key>CFBundleIdentifier</key>
            <string>com.dinobox.pa-painter</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>pa-painter-gui</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.graphics-design</string>
            <key>NSSupportsAutomaticGraphicsSwitching</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Codesign .app bundle
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            "PA Painter.app"
          codesign --verify --deep --verbose "PA Painter.app"

      - name: Create and sign DMG
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DMG_NAME="pa-painter-gui-${TAG}-universal-apple-darwin.dmg"

          # Stage DMG contents: .app + Applications shortcut
          mkdir dmg-stage
          mv "PA Painter.app" dmg-stage/
          ln -s /Applications dmg-stage/Applications

          hdiutil create -volname "PA Painter" \
            -srcfolder dmg-stage \
            -ov -format UDZO \
            "$DMG_NAME"

          codesign --force --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_NAME"

      - name: Codesign and notarize CLI binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" \
            "$UNIVERSAL_DIR/pa-painter"
          codesign --verify --verbose "$UNIVERSAL_DIR/pa-painter"

          NOTARIZE_ZIP="$RUNNER_TEMP/cli-notarize.zip"
          ditto -c -k --keepParent "$UNIVERSAL_DIR/pa-painter" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Package CLI tar.gz
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          CLI_DIR="pa-painter-cli-${TAG}-universal-apple-darwin"
          mkdir "$CLI_DIR"
          cp "$UNIVERSAL_DIR/pa-painter" "$CLI_DIR/"
          cp README.md LICENSE CHANGELOG.md "$CLI_DIR/"
          tar czf "${CLI_DIR}.tar.gz" "$CLI_DIR"
          echo "CLI_ASSET=${CLI_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: universal-apple-darwin-dmg
          path: ${{ env.DMG_NAME }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v5
        with:
          name: universal-apple-darwin-cli
          path: ${{ env.CLI_ASSET }}

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  build-other:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe

          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            appimage_arch: x86_64

          - name: Linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            appimage_arch: aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Disable Windows Defender real-time monitoring
        if: runner.os == 'Windows'
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package AppImage (Linux GUI)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Download appimagetool
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage"
          chmod +x appimagetool

          # Build AppDir
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps

          cp "target/${{ matrix.target }}/release/pa-painter-gui" AppDir/usr/bin/
          cp assets/pa-painter.desktop AppDir/usr/share/applications/
          cp assets/pa-painter.desktop AppDir/
          cp assets/icon_default.png   AppDir/usr/share/icons/hicolor/256x256/apps/pa-painter.png
          cp assets/icon_default.png   AppDir/pa-painter.png
          ln -s usr/bin/pa-painter-gui AppDir/AppRun

          # Create AppImage (type 3: no FUSE required on end-user machines)
          APPIMAGE_NAME="pa-painter-gui-${TAG}-${{ matrix.target }}.AppImage"
          ARCH=${{ matrix.appimage_arch }} ./appimagetool --no-fuse AppDir "$APPIMAGE_NAME"
          echo "APPIMAGE=$APPIMAGE_NAME" >> "$GITHUB_ENV"

      - name: Package CLI (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR="pa-painter-cli-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/pa-painter" "$DIR/"
          cp README.md LICENSE CHANGELOG.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "CLI_ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/',''
          $dir = "pa-painter-gui-${tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/${{ matrix.target }}/release/pa-painter-gui${{ matrix.ext }}" "$dir/"
          Copy-Item README.md,LICENSE,CHANGELOG.md "$dir/"
          Compress-Archive -Path "$dir" -DestinationPath "${dir}.zip"
          echo "GUI_ASSET=${dir}.zip" >> $env:GITHUB_ENV

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/',''
          $dir = "pa-painter-cli-${tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/${{ matrix.target }}/release/pa-painter${{ matrix.ext }}" "$dir/"
          Copy-Item README.md,LICENSE,CHANGELOG.md "$dir/"
          Compress-Archive -Path "$dir" -DestinationPath "${dir}.zip"
          echo "CLI_ASSET=${dir}.zip" >> $env:GITHUB_ENV

      - name: Upload GUI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}-gui
          path: ${{ env.GUI_ASSET }}

      - name: Upload CLI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}-cli
          path: ${{ env.CLI_ASSET }}

      - name: Upload AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}-appimage
          path: ${{ env.APPIMAGE }}

      - name: Upload CLI artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}-cli
          path: ${{ env.CLI_ASSET }}

  publish:
    name: Publish to itch.io
    needs: [build-other, macos-universal]
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          ./butler push artifacts/x86_64-pc-windows-msvc-gui/* \
            "$ITCH_GAME:windows" --userversion "$VERSION"

          ./butler push artifacts/x86_64-unknown-linux-gnu-appimage/* \
            "$ITCH_GAME:linux" --userversion "$VERSION"

          ./butler push artifacts/aarch64-unknown-linux-gnu-appimage/* \
            "$ITCH_GAME:linux-arm64" --userversion "$VERSION"

          ./butler push artifacts/universal-apple-darwin-dmg/* \
            "$ITCH_GAME:macos" --userversion "$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cat > release_notes.md <<'NOTES'
          ## Download

          **[Download from itch.io](https://dinoboxgamedev.itch.io/papainter)**

          See [CHANGELOG.md](https://github.com/dinobox-dev/PA-Painter/blob/main/CHANGELOG.md) for details.
          NOTES
          gh release create "$TAG" \
            artifacts/x86_64-pc-windows-msvc-cli/* \
            artifacts/x86_64-unknown-linux-gnu-cli/* \
            artifacts/aarch64-unknown-linux-gnu-cli/* \
            artifacts/universal-apple-darwin-cli/* \
            --title "PA Painter $TAG" \
            --notes-file release_notes.md
